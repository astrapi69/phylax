name: Mutation Testing (Nightly)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Mutation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci

      - name: Mutation - crypto (threshold 95%)
        run: make test-mutation-quick

      - name: Mutation - repositories (threshold 95%)
        run: make test-mutation-repos

      - name: Mutation - parser (threshold 55%)
        run: make test-mutation-parser

      - name: Mutation - import (threshold 75%)
        run: make test-mutation-import

      - name: Upload Stryker reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-reports
          path: reports/mutation/
          retention-days: 14
