name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: make lint
      - run: make typecheck

  unit-tests:
    name: Unit Tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: make test-coverage
      - uses: actions/upload-artifact@v7
        if: matrix.node-version == 24
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 14

  e2e-dev:
    name: E2E (Dev)
    runs-on: ubuntu-latest
    # Steady-state suite runtime is ~13-14 min (3 browsers x 1 worker x
    # ~91 tests x retries=2). The original 15 min cap left no headroom
    # and consistently killed runs at exactly 15:04 once the webkit /
    # firefox explicit waits added in 06b5f63 / 314f1ae / a907219
    # pushed per-test wall time up. Raise to 25 to absorb the steady
    # state plus a flake retry. Structural fix (shard browsers across
    # parallel jobs) is tracked separately.
    timeout-minutes: 25
    # TD-10 (b+c): Playwright's official container image ships with
    # browsers and all system deps pre-baked. Running the job inside
    # the container eliminates the apt-install flake class that TD-10
    # (a)+(a2) worked around with retries. Pin the tag to the
    # @playwright/test version installed in package.json; mismatches
    # cause subtle driver-vs-browser incompatibilities.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    # F-06b cross-browser follow-up: Firefox refuses to launch when
    # `$HOME` is owned by a different user than the one running the
    # process ("Firefox is unable to launch if the $HOME folder isn't
    # owned by the current user"). The Playwright container runs the
    # job as root but GitHub Actions sets `$HOME=/github/home` which
    # is owned by `pwuser`. Pin HOME to `/root` (the actual home of
    # the in-container user) so Firefox + Chromium + WebKit all start
    # cleanly. Documented in the Playwright Docker docs as the
    # supported workaround.
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Inline the Makefile target body (= `npm run test:e2e`). The
      # Playwright container image does not ship `make`. See
      # .claude/rules/ai-workflow.md "CI-in-container exception".
      - run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-dev
          path: playwright-report/
          retention-days: 14

  build:
    name: Build & Bundle Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: make build
      - name: Check bundle size (size-limit, budgets in .size-limit.json)
        run: npm run size
      - name: Bundle size summary
        if: always()
        run: |
          echo "## Bundle size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Asset | Gzipped |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          for f in dist/assets/*.js dist/assets/*.css; do
            [ -e "$f" ] || continue
            SIZE=$(gzip -c "$f" | wc -c)
            echo "| $(basename "$f") | $(numfmt --to=iec "$SIZE") |" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Budgets enforced by size-limit (see .size-limit.json)." >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v7
        with:
          name: production-build
          path: dist/
          retention-days: 1

  e2e-production:
    name: E2E (Production)
    runs-on: ubuntu-latest
    needs: build
    # See timeout-minutes comment on e2e-dev above. Same suite size,
    # same browser matrix; production additionally pays the preview
    # server start + service-worker activation cost on first nav.
    timeout-minutes: 25
    # TD-10 (b+c): see comment on e2e-dev. Same container image; the
    # production build artifact is downloaded into the container
    # workspace and exercised against preview.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    # F-06b cross-browser follow-up: Firefox HOME-ownership workaround.
    # See E2E (Dev) for the rationale.
    env:
      HOME: /root
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v8
        with:
          name: production-build
          path: dist/
      # Inline the Makefile target body
      # (= `npx playwright test --config playwright.config.production.ts`).
      # See .claude/rules/ai-workflow.md "CI-in-container exception".
      - run: npx playwright test --config playwright.config.production.ts
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 14
