name: Deploy to GitHub Pages

# Triggers AFTER ci.yml completes successfully on main. Avoids duplicating
# the test suite (ci.yml already lints, typechecks, runs unit + e2e + prod
# e2e + size-limit against the same commit SHA). Manual dispatch is also
# supported for re-deploying without a new commit.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# GitHub Pages permissions.
permissions:
  contents: read
  pages: write
  id-token: write

# One active Pages deployment at a time; queue others to preserve order.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Only proceed when the upstream CI workflow succeeded, or when manually
    # dispatched. workflow_run fires regardless of conclusion, so the gate
    # belongs in the job condition.
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: make build
      # SPA fallback: GitHub Pages serves 404.html for unknown paths. Copying
      # index.html preserves the React Router state on deep-link direct visits
      # (for example, a shared link to /phylax/chat) until the service worker
      # takes over.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
