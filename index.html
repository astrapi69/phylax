<!doctype html>
<html lang="de" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />

    <!-- Primary SEO -->
    <meta
      name="description"
      content="Datensouveräne Gesundheits-PWA. Lokale AES-256-Verschlüsselung, keine Cloud, keine Konten. Für dich selbst oder als Betreuungsprofil für Angehörige."
    />
    <meta
      name="keywords"
      content="privacy-first health, encrypted health record, local-first PWA, caregiver health management, zero-knowledge health app, Gesundheitsdaten lokal, verschlüsseltes Gesundheitstagebuch"
    />
    <meta name="author" content="@@APP_AUTHOR@@" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://astrapi69.github.io/phylax/" />

    <!--
      Flash-prevention: apply the dark class before React mounts. Logic is
      intentionally duplicated from src/features/theme/themeStorage.ts because
      extracting it would reintroduce the bootstrap-order problem. See ADR-0009.
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('phylax-theme');
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'auto' ? stored : 'auto';
          var isDark =
            theme === 'dark' ||
            (theme === 'auto' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage disabled or error; fall through to light.
        }
      })();
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Apple PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Apple deprecated apple-mobile-web-app-capable in iOS 16.4+. Both
         tags coexist: the prefixed one for iOS < 16.4, the unprefixed
         standard for iOS 16.4+ and other browsers. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Phylax" />
    <meta name="application-name" content="Phylax" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Phylax" />
    <meta property="og:title" content="Phylax - Lebende Gesundheit, lokal verschlüsselt" />
    <meta
      property="og:description"
      content="Datensouveräne Gesundheits-PWA. Lokale AES-256-Verschlüsselung, keine Cloud, keine Konten. Für dich selbst oder als Betreuungsprofil für Angehörige."
    />
    <meta property="og:url" content="https://astrapi69.github.io/phylax/" />
    <meta property="og:image" content="https://astrapi69.github.io/phylax/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Phylax - Lebende Gesundheit. Verlauf, Kontext, Datenhoheit."
    />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:locale:alternate" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Phylax - Lebende Gesundheit, lokal verschlüsselt" />
    <meta
      name="twitter:description"
      content="Datensouveräne Gesundheits-PWA. Lokale AES-256-Verschlüsselung, keine Cloud, keine Konten. Für dich selbst oder als Betreuungsprofil für Angehörige."
    />
    <meta name="twitter:image" content="https://astrapi69.github.io/phylax/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="Phylax - Lebende Gesundheit. Verlauf, Kontext, Datenhoheit."
    />

    <!-- Structured data: WebApplication (HealthApplication category).
         Version, author and license below are injected at build time from
         package.json by the phylax-html-metadata Vite plugin, keeping them a
         single source of truth. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Phylax",
        "description": "Datensouveräne Gesundheits-PWA. Lokale AES-256-Verschlüsselung, keine Cloud, keine Konten. Für dich selbst oder als Betreuungsprofil für Angehörige.",
        "url": "https://astrapi69.github.io/phylax/",
        "applicationCategory": "HealthApplication",
        "operatingSystem": "Any (Progressive Web App)",
        "softwareVersion": "@@APP_VERSION@@",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "EUR"
        },
        "author": {
          "@type": "Person",
          "name": "@@APP_AUTHOR@@"
        },
        "inLanguage": ["de", "en"],
        "featureList": [
          "AES-256-GCM encryption with PBKDF2 key derivation",
          "Local-first storage via Dexie/IndexedDB",
          "PWA with offline support",
          "Multi-profile (own + caregiver)",
          "PDF export for medical visits",
          "Multi-AI provider with BYOK",
          "i18n: DE, EN"
        ],
        "license": "https://spdx.org/licenses/@@APP_LICENSE@@.html",
        "screenshot": "https://astrapi69.github.io/phylax/og-image.png"
      }
    </script>

    <title>Phylax - Lebende Gesundheit, lokal verschlüsselt</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
