<!doctype html>
<html lang="de" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Dein lokales, verschluesseltes Gesundheitsprofil." />

    <!--
      Flash-prevention: apply the dark class before React mounts. Logic is
      intentionally duplicated from src/features/theme/themeStorage.ts because
      extracting it would reintroduce the bootstrap-order problem. See ADR-0009.
    -->
    <script>
      (function () {
        try {
          var stored = window.localStorage.getItem('phylax-theme');
          var theme =
            stored === 'light' || stored === 'dark' || stored === 'auto' ? stored : 'auto';
          var isDark =
            theme === 'dark' ||
            (theme === 'auto' &&
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          // localStorage disabled or error; fall through to light.
        }
      })();
    </script>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <!-- Apple PWA -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <!-- Apple deprecated apple-mobile-web-app-capable in iOS 16.4+. Both
         tags coexist: the prefixed one for iOS < 16.4, the unprefixed
         standard for iOS 16.4+ and other browsers. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Phylax" />

    <title>Phylax</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
